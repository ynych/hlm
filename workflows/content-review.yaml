# 内容审查流程

## 目的
通过专家抽查和问题分级，确保交付物质量达标。

---

## 触发条件
- 生成物提交后
- 用户要求质量检查
- 定期抽查（如每5回抽查1回）
- 关键交付物（如情榜回）

---

## 执行步骤

### 1. 审查准备

#### 选择审查内容
- 随机抽查: 每N个生成物抽查1个
- 关键节点: 高潮回、转折回
- 用户指定: 特定回目

#### 分配审查专家
- 隔离原则: 生成专家≠审查专家
- 复用机制: 优先使用已有Agent
- 并行审查: 多维度同时审查

### 2. 并行审查

#### 审查维度
| Agent | 维度 | 检查项 |
|-------|------|--------|
| STY | 风格贴合度 | 清代白话、含蓄暗示、无直白标注 |
| CHR | 人物一致性 | 性格、关系、命运符合前80回 |
| POE | 诗词格律 | 回末诗平仄、对仗、押韵 |
| ARC | 结构完整性 | 情节完整、过渡自然、伏笔回收 |
| LCT | 文学性 | 悲剧美学、意象运用、草蛇灰线 |

#### 审查输出
```markdown
## [Agent名]审查报告

**审查对象**: [回目/文件]
**审查维度**: [维度名]
**评分**: [X]/10

### P0级问题（致命）
- [ ] 问题描述 | 位置 | 建议修复

### P1级问题（重要）
- [ ] 问题描述 | 位置 | 建议修复

### P2级建议（优化）
- [ ] 建议描述 | 位置

### 总体评价
[3-5句话]

**审查结论**: [通过/有条件通过/不通过]
```

### 3. 问题汇总

#### 汇总格式
```markdown
## 审查汇总报告

**审查对象**: [文件名]
**审查时间**: [日期]
**参与专家**: [Agent列表]

### 问题统计
| 级别 | 数量 | 状态 |
|------|------|------|
| P0 | X | 待修复 |
| P1 | Y | 待修复 |
| P2 | Z | 可选 |

### 问题清单
#### P0级
1. [问题描述] | [位置] | [建议]

#### P1级
1. [问题描述] | [位置] | [建议]

#### P2级
1. [建议描述] | [位置]

### 修复建议
**优先级**: P0 > P1 > P2
**修复顺序**: [建议顺序]
```

### 4. 问题分级

#### P0级（致命问题）- 必须修复
- 人物关系根本矛盾
- 判词与结局矛盾
- 历史常识性错误
- 严重OOC（人物性格崩坏）

#### P1级（重要问题）- 建议修复
- 人物性格轻微OOC
- 时间线不合理
- 判词落实不够精准
- 节奏问题

#### P2级（优化建议）- 可选修复
- 文学性提升
- 细节丰富
- 节奏微调

### 5. 修复与复验

#### 修复流程
1. 开发者修复P0/P1问题
2. 自检确认
3. 提交复验

#### 复验标准
- P0问题: 100%修复
- P1问题: 80%+修复
- P2问题: 可选

#### 复验输出
```markdown
## 复验报告

**原审查**: [审查报告链接]
**修复提交**: [提交记录]
**复验结果**:
- P0: X/Y 已修复
- P1: X/Y 已修复
- P2: X/Y 已修复

**最终结论**: [通过/需再次修复]
```

---

## 输出

- 审查汇总报告
- 问题分级清单
- 修复建议
- 复验报告
- 质量趋势分析（可选）
