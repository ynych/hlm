# 项目更新workflow

## 目的
维护上下文恢复提示词和项目文档的同步更新。

---

## 触发条件
- 用户显式要求"更新项目提示词"
- 版本号升级
- 关键交付物状态变更
- 新增/修改工作流
- 目录结构重大变更
- 重要文档位置变更

---

## 更新检查清单

### 模块更新检查
- [ ] 模块1: 核心项目信息（版本号、路径等）
- [ ] 模块2: 当前状态（交付物状态更新）
- [ ] 模块3: 当前关键任务（清单状态更新）
- [ ] 模块4: 项目目录结构（如有变更）
- [ ] 模块5: 重要文档位置（如有变更）
- [ ] 模块6: 最新进展（添加新进展）
- [ ] 模块7: 工作流清单（新增/状态更新）
- [ ] 模块8: 关键约束（如有变更）
- [ ] 模块9: 记忆锚点（如有新增）
- [ ] 模块10: 高效确认反馈机制（确认无误）
- [ ] 模块11: 项目更新workflow（确认无误）

### 元数据更新
- [ ] 最后更新日期
- [ ] 版本号
- [ ] 更新人（AI/用户）

---

## 执行步骤

### 1. 变更检测
- 对比当前状态与提示词记录
- 识别需要更新的模块
- 标记变更类型（新增/修改/删除）

### 2. 内容更新
- 按模块逐项更新
- 保持格式一致性
- 添加变更标记（如【2026-03-22更新】）

### 3. 验证检查
- 链接有效性检查
- 路径正确性检查
- 版本号一致性检查

### 4. 同步更新
- 更新 `.openclaw/context-recovery.md`
- 同步到 `README.md`（如需要）
- 更新其他相关文档

### 5. 用户确认
- 展示变更摘要
- 等待用户确认
- 根据反馈调整

---

## 变更摘要格式

```markdown
## 变更摘要

**更新时间**: [日期]
**更新原因**: [触发条件]
**涉及模块**: [模块列表]

### 具体变更
| 模块 | 变更类型 | 变更内容 |
|------|----------|----------|
| 模块X | 新增/修改/删除 | [简述] |

### 影响评估
- [影响范围]
- [注意事项]
```

---

## 同步机制

### AI用提示词
- 文件: `.openclaw/context-recovery.md`
- 用途: 新会话快速恢复
- 格式: 完整模块结构

### 人类用看板
- 文件: `README.md`
- 用途: 项目概览
- 格式: 简化版，侧重阅读体验

### 同步规则
- 核心信息必须同步
- AI提示词保留详细约束
- 人类看板简化流程细节
- 两者版本号保持一致

---

## 输出

- 更新的上下文恢复提示词
- 更新的README.md（如需要）
- 变更摘要
- 版本更新记录
