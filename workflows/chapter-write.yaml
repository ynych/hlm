# 章节创作工作流

## 触发条件
- 用户请求创作新章节
- 大纲已确定

## 执行步骤

### 1. 准备阶段
- 读取大纲对应回目
- 加载创作规则
- 确定本章字数目标

### 2. 创作阶段
- 按大纲情节创作
- 遵循创作规则（无【XX内心】、含蓄暗示等）
- 每回必含回末诗

### 3. 自检阶段
- 字数检查（5000-10000字）
- 情节完整性检查
- 风格合规检查
- 回末诗格律检查

### 4. 提交阶段
- 保存到 lifecycle/03-write/fulltext/v0.1.0/partX/
- Git提交
- 推送GitHub

## 输出
- 完整章节文件
- Git提交记录