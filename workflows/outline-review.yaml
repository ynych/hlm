# 大纲评审工作流

## 触发条件
- 大纲版本更新后
- 用户请求专家评审

## 执行步骤

### 1. 准备阶段
- 读取大纲文件
- 准备评审标准

### 2. 并行评审
启动多个Agent并行评审：
- ARC (Architecture): 结构完整性
- CHR (Character): 人物一致性
- STY (Style): 风格贴合度
- POE (Poetry): 诗词格律
- RED (Redology): 红学合规性

### 3. 汇总报告
- 收集各Agent评审结果
- 生成综合评分
- 输出改进建议

### 4. 用户确认
- 展示评审报告
- 等待用户决策

## 输出
- 专家评审报告
- 改进建议清单
- 综合评分