# 规则迭代流程

## 目的
根据用户反馈持续优化规则，形成可复用的最佳实践。

---

## 触发条件
- 用户指出规则问题
- 生成内容不符合预期
- 新场景需要规则补充
- 评审发现系统性问题

---

## 执行步骤

### 1. 问题收集

#### 来源
- 用户直接反馈
- 生成物评审结果
- 专家评审报告
- 内容审查记录

#### 记录格式
```markdown
## [日期] 规则问题反馈

**规则文件**: [路径]
**问题描述**: [简述]
**影响**: [对生成内容的影响]
**建议**: [用户建议]
```

### 2. 问题分析

#### 分类
- **缺失**: 规则未覆盖的场景
- **矛盾**: 规则之间冲突
- **模糊**: 规则表述不清
- **过时**: 规则已不适用

#### 优先级
- P0: 影响当前版本交付
- P1: 影响下一版本质量
- P2: 优化建议

### 3. 规则修订

#### 修订原则
- 保持规则一致性
- 避免过度复杂
- 可验证可执行
- 文档化变更

#### 修订记录
```markdown
## [日期] 规则修订

**规则文件**: [路径]
**修订类型**: [新增/修改/删除]
**修订内容**: 
- 修改前: [旧内容]
- 修改后: [新内容]
**修订原因**: [简述]
**影响评估**: [对已有交付物的影响]
```

### 4. 规则验证

#### 验证方式
- 使用新规则生成测试内容
- 专家评审验证
- 用户确认

#### 验证标准
- 生成内容符合预期
- 无新增问题
- 效率未降低

### 5. 规则发布

#### 发布检查
- [ ] 规则文档已更新
- [ ] 修订记录已添加
- [ ] 版本号已更新（如需要）
- [ ] 相关Agent已同步

#### 同步机制
- 更新规则文件
- 更新上下文恢复提示词
- 通知相关方

---

## 规则版本管理

### 版本号规则
- 格式: `[主版本].[次版本].[修订]`
- 重大变更: 主版本+1
- 新增规则: 次版本+1
- 修订优化: 修订+1

### 版本记录
```
rules/
├── outline-creation-rules.md           # 当前版本
├── outline-creation-rules.v1.0.0.md    # 历史版本
└── CHANGELOG.md                         # 变更日志
```

---

## 输出

- 更新的规则文档
- 规则修订记录
- 验证报告
- 更新的上下文恢复提示词
