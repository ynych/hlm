# 需求澄清流程

## 目的
将模糊的用户指令转化为明确的执行任务，避免误解和返工。

---

## 触发条件
- 用户指令存在歧义
- 涉及多个选项需要用户决策
- 首次执行新类型任务
- 涉及版本号变更

---

## 执行步骤

### 1. 指令分析
- 解析用户意图
- 识别关键需求点
- 标记模糊/缺失信息

### 2. 问题分级

#### P0级（必须澄清）
- 版本号变更
- 交付物范围变更
- 质量标准变更
- 关键约束冲突

#### P1级（建议澄清）
- 优先级排序
- 资源分配
- 时间节点
- 验收标准

#### P2级（可选澄清）
- 实现细节偏好
- 风格选择
- 格式微调

### 3. 生成确认请求

使用标准格式：
```
【决策点】[问题描述]

a) [选项一] - [说明]
b) [选项二] - [说明]
c) [选项三] - [说明]

默认: [X]（如用户未指定）
回复格式: X
```

### 4. 等待用户确认
- 暂停执行
- 记录待确认事项
- 超时提醒（如需要）

### 5. 执行确认结果
- 根据用户选择执行
- 更新项目状态
- 记录决策到MEMORY.md

---

## 决策记录模板

```markdown
## [日期] 决策记录

**决策点**: [问题描述]
**用户选择**: [选项X]
**执行结果**: [简述]
**影响范围**: [影响的交付物/版本]
```

---

## 高效反馈机制

### 单选问题
- 提供2-3个选项
- 标注默认选项（**粗体**）
- 明确回复格式

### 多选问题
- 标注【可多选】
- 提供"全选"选项
- 说明组合规则

### 确认问题
- 使用 a)确认 b)修改 格式
- 展示当前方案摘要
- 提供修改入口

### 紧急事项
- 标注【紧急】
- 说明超时后果
- 提供快速确认方式

---

## 输出

- 澄清记录文档
- 确认后的执行计划
- 更新的项目状态
