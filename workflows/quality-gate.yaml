# 质量达标检查流程

## 目的
系统验证v0.1.0交付物是否满足发布标准，决定是否锁定版本。

---

## 触发条件
- 用户要求质量检查
- 交付物声称完成
- 版本升级前
- 定期审计（如每周）

---

## 检查清单

### 大纲v0.1.0检查

#### 完整性检查
- [ ] 28回大纲完整
- [ ] 每回包含: 标题、情节摘要、关键场景、判词落实
- [ ] 五部结构清晰
- [ ] 人物命运与判词对应

#### 质量检查
- [ ] 评审报告完整（6维度100分制）
- [ ] 评分≥9.0分
- [ ] P0问题已修复
- [ ] P1问题已处理

#### 可追溯性
- [ ] 评审专家身份明确
- [ ] 评审标准文档化
- [ ] 问题分级记录完整

### 全文v0.1.0检查

#### 完整性检查
- [ ] 28回全文完整
- [ ] 每回字数5000-10000字
- [ ] 合并版全文可生成
- [ ] 分章节文件完整

#### 质量检查
- [ ] 五维度评审≥9.0分
- [ ] 风格贴合度达标
- [ ] 人物一致性达标
- [ ] 诗词格律达标
- [ ] P0问题已修复

#### 格式检查
- [ ] 回目格式统一（八字对仗）
- [ ] 回末诗完整（28首）
- [ ] 章节编号连续

### 评审报告v0.1.0检查

#### 完整性
- [ ] 大纲评审报告
- [ ] 全文综合评审报告
- [ ] 分Part评审报告
- [ ] 专家评审原始记录

#### 可追溯性
- [ ] 评审标准文档
- [ ] 专家评审身份
- [ ] 评分依据说明
- [ ] 问题分级标准

### 规则文档检查

#### 大纲生成规则
- [ ] 规则文档化
- [ ] 输入输出标准明确
- [ ] 质量检查点清晰
- [ ] 可复现验证

#### 全文生成规则
- [ ] 创作规则文档化
- [ ] 风格标准明确
- [ ] 自检清单完整
- [ ] 可复现验证

#### 专家评审规则
- [ ] 评审维度明确
- [ ] 评分标准量化
- [ ] 问题分级标准
- [ ] 专家选择机制

### 质量保障机制检查

#### 规则迭代
- [ ] 规则迭代流程文档
- [ ] 问题收集机制
- [ ] 修订记录完整

#### 内容审查
- [ ] 审查流程文档
- [ ] 专家分配机制
- [ ] 问题分级标准
- [ ] 修复复验流程

---

## 达标判定

### 判定标准
| 交付物 | 达标条件 | 状态 |
|--------|----------|------|
| 大纲v0.1.0 | 完整+评分≥9.0+P0修复 | 待判定 |
| 全文v0.1.0 | 完整+评分≥9.0+P0修复 | 待判定 |
| 评审报告v0.1.0 | 完整+可追溯 | 待判定 |
| 大纲生成规则 | 文档化+可复现 | 待判定 |
| 全文生成规则 | 文档化+可复现 | 待判定 |
| 质量保障机制 | 流程文档化 | 待判定 |

### 判定结果
- **全部达标**: 可升级版本号（需用户确认）
- **部分达标**: 继续完善未达标项
- **未达标**: 继续完善

---

## 输出

- 质量达标检查报告
- 达标判定结果
- 未达标项清单
- 改进建议
- 版本升级建议（如达标）
